# Cloud reasoning server for Alibaba Simple Application Server (SAS) or any Docker host.
# Build context is the repo root so the Dockerfile can COPY cloud/ and edge/.
#   cd <repo-root>
#   docker compose -f cloud/sas_deploy/docker-compose.yml up -d --build
services:
  reasoning:
    build:
      context: ../..
      dockerfile: cloud/sas_deploy/Dockerfile
    image: edge-inspection-cloud:latest
    container_name: edge-inspection-cloud
    ports:
      - "8080:8080"           # matches SAS default firewall + the proof screenshot
    env_file:
      - ../../.env            # DASHSCOPE_API_KEY, QWEN_MODEL, QWEN_BASE_URL
    environment:
      - PORT=8080
    restart: unless-stopped
    mem_limit: 512m           # the reasoning server is tiny; leave headroom for the OS
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/healthz').read() else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
